<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login for Hemanth Prasath portfolio">
  <title>Admin Login | Hemanth Prasath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="loader" id="loader" aria-label="Loading login">
    <div class="loader-core">
      <span></span>
      <p>Loading Login</p>
    </div>
  </div>

  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>
  <canvas id="neuralCanvas" aria-hidden="true"></canvas>

  <div class="login-wrapper">
    <div class="login-container glass-card reveal">
      <div class="login-header">
        <div class="login-logo">
          <i data-lucide="shield-check"></i>
        </div>
        <h1>Admin Login</h1>
        <p>Access the portfolio management dashboard</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="hemanrhprasath.hp@gmail.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn primary full-width">
          <i data-lucide="log-in"></i>
          Sign In
        </button>
      </form>

      <div class="login-footer">
        <p>Protected by advanced security protocols</p>
        <a href="../index.html">← Back to Portfolio</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (email === 'hemanrhprasath.hp@gmail.com' && password === 'Pr@s@th0304') {
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminEmail', email);
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials. Please try again.');
      }
    });
  </script>

  <style>
    .login-wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      text-align: center;
    }

    .login-header {
      margin-bottom: 32px;
    }

    .login-logo {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border: 1px solid var(--purple);
      border-radius: 50%;
      background: rgba(168, 85, 247, 0.1);
      color: var(--cyan);
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
    }

    .login-header h1 {
      font-size: 1.75rem;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .login-form {
      display: grid;
      gap: 20px;
      text-align: left;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      min-height: 46px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--muted);
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--purple);
    }

    .forgot-link {
      color: var(--cyan);
      text-decoration: none;
      transition: color 0.22s ease;
    }

    .forgot-link:hover {
      color: var(--purple);
    }

    .full-width {
      width: 100%;
    }

    .login-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .login-footer p {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .login-footer a {
      color: var(--cyan);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.22s ease;
    }

    .login-footer a:hover {
      color: var(--purple);
    }

    @media (max-width: 560px) {
      .login-container {
        padding: 28px;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</body>
</html>
